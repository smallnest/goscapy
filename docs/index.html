<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goscapy — Redirecting...</title>
  <script>
    (function () {
      var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      var target = lang.startsWith('zh') ? 'zh/index.html' : 'en/index.html';
      window.location.replace(target);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=en/index.html">
  </noscript>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #FAF9F6;
      color: #8B8680;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    a { color: #5B8A72; }
  </style>
</head>
<body>
  <p>Redirecting&hellip; <a href="en/index.html">English</a> | <a href="zh/index.html">中文</a></p>
</body>
</html>
